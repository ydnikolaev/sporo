# Cuts a GitHub release with GoReleaser whenever a `v*` tag lands. Plain `v*`,
# not `cli/v*` — see .goreleaser.yaml's top comment for why (monorepo.tag_prefix
# is GoReleaser Pro-only; web/ deploys on `main`, not by tag, so there's no real
# collision today).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # goreleaser creates the GitHub Release
  id-token: write # mint the OIDC token for keyless Sigstore signing (cosign + attestations)
  attestations: write # persist the build-provenance attestation to GitHub

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # GoReleaser's changelog needs the full history, not the default shallow clone.
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      # cosign is NOT preinstalled on the runner — the .goreleaser.yaml `signs` block
      # (keyless sign-blob over checksums.txt) fails without it.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # syft is NOT preinstalled either — the `sboms` block needs it. The download-syft
      # sub-action is lighter than the full sbom-action when goreleaser only needs the binary.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # SLSA build provenance for every artifact goreleaser hashed into dist/checksums.txt —
      # one attestation call covers the whole release. Must run AFTER goreleaser, which
      # produces that file. Users verify with `gh attestation verify <file> -R ydnikolaev/sporo`.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: ./dist/checksums.txt
