# The Go CLI's fast gate on every push and PR — the same gates `make check` runs locally,
# split into a lint job and a test job. Path-filtered so a web/-only change doesn't burn Go
# CI minutes. GOWORK=off everywhere: a green build under a workspace proves nothing about the
# fresh checkout a stranger installs (this repo's e2e contract).
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "web/**"
  pull_request:
    paths-ignore:
      - "web/**"

permissions:
  contents: read

env:
  GOWORK: "off"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
      - name: gofumpt formatting
        run: |
          go install mvdan.cc/gofumpt@latest
          make fmt-check
      - name: go.mod / go.sum tidy
        run: make tidy-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # Reads the toolchain (incl. the toolchain directive) straight from go.mod.
          go-version-file: go.mod

      - name: build without a workspace
        # A stray go.work must never leak module replacements a consumer's `go install`
        # wouldn't see — GOWORK=off (env above) is the gate.
        run: go build ./...

      - name: tests + coverage gate
        # `make coverage` runs the suite with a profile, then enforces the coveragepolicy SSOT
        # (per-package + global floor).
        run: make coverage

      - name: recipes sealed, coherent & gate-passed
        # `sporo lint` runs the genre check AND the registry coherence gate over recipes/: it
        # reds if a recipe drifted from its seal without a version bump, or a finished recipe
        # was never sealed. The committed .sporo/registry.yaml is the auditable ledger.
        run: go run ./cmd/sporo lint

      - name: docs surface is in sync
        # web/src/data/surface.json is the committed snapshot the site's docs page renders
        # from — regenerate from the live cobra tree and fail on any diff.
        run: |
          go generate ./...
          git diff --exit-code -- web/src/data/surface.json

  # web:
  #   Nuxt/Astro CI (lint/build) once web/ has content worth gating. Trigger on paths: web/**
  #   (the inverse filter of the jobs above), runs independently on its own runtime.
