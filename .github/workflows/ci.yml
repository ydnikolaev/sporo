# Builds and tests the Go CLI on every push and PR. Path-filtered so a future
# web/ (Nuxt) change doesn't burn Go CI minutes on a diff that never touches Go —
# see the commented `web` job stub below for where that lands.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "web/**"
  pull_request:
    paths-ignore:
      - "web/**"

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          # Reads the toolchain version straight from go.mod instead of duplicating
          # it here — one fewer place to forget to bump.
          go-version-file: go.mod

      - run: go build ./...

      - name: build without a workspace
        # Guards against a stray go.work leaking module replacements into the build
        # that wouldn't be there for a consumer running `go install`.
        run: go build ./...
        env:
          GOWORK: "off"

      - run: go test ./...

      - run: go vet ./...

      - name: recipes sealed, coherent & gate-passed
        # The shipped corpus rides its own gate on every push. `sporo lint` with no argument runs
        # the genre check AND the registry coherence gate over recipes/ (the home named in
        # .sporo/config.yaml): it reds if a recipe drifted from its seal without a version bump, or
        # a finished recipe was never sealed. This is the automated, public proof that every recipe
        # is sealed and gate-passed — the committed .sporo/registry.yaml is the auditable ledger a
        # third party can recompute against. Runs on any push that touches recipes/ or .sporo/
        # (web/** is path-ignored above, but a recipe edit is a Go-job trigger).
        run: go run ./cmd/sporo lint
        env:
          GOWORK: "off"

      - name: docs surface is in sync
        # web/src/data/surface.json is the committed snapshot of the command surface the
        # site's docs page renders from. Regenerate it from the live cobra tree and fail on
        # any diff — a changed Short:, a new flag, or a new verb can never silently outdate
        # the docs. (A Go change triggers this job even though web/ is path-ignored, because
        # the source of the drift is always a Go edit, never the generated file.)
        run: |
          go generate ./...
          git diff --exit-code -- web/src/data/surface.json

  # web:
  #   Nuxt CI (lint/build) once web/ has content worth gating. Trigger on paths: web/**
  #   (the inverse filter of the `go` job above), runs independently on its own runtime.
