# CodeQL static security analysis for Go — free code scanning for public repos, results in the
# Security tab. Runs on push/PR to main and weekly (catches newly-published query patterns
# against unchanged code).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off" # analyze the fresh-checkout build, never a workspace's replacements
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
