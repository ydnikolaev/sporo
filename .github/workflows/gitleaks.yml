# Secret scanning. Closes the classify gate's honest gap: that gate keeps whole harness/docs
# dirs private, but can't catch a secret pasted INTO a public file — gitleaks does, across the
# working tree and full history (fetch-depth: 0). Free for public/personal repos.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
