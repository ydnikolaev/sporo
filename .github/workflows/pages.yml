# Builds the Astro site (web/) and deploys it to GitHub Pages. Unlike the pre-Astro version,
# this runs a Node build step — that is the price of the docs page being generated from the
# committed command surface instead of hand-written. Action versions verified against their
# releases, 2026-07-16.
name: Pages

on:
  push:
    branches: [main]
    paths: ["web/**", "recipes/**", ".sporo/**", "scripts/install.sh", ".github/workflows/pages.yml"]
  # A published release must redeploy the site: the version badge and the changelog are resolved at
  # BUILD time (`gh release view` / the Releases API), and the tag-triggered Release workflow creates
  # the release AFTER the main push that already deployed the site — so without this the site sits
  # one release behind forever (this latent bug shipped v0.5–v0.9 each a version behind).
  #
  # NOT `on: release`: goreleaser publishes the release with GITHUB_TOKEN, and GitHub does not create
  # workflow runs from GITHUB_TOKEN-triggered events ("other GITHUB_TOKEN-triggered events do not
  # create workflow runs at all", except workflow_dispatch/repository_dispatch). `workflow_run` fires
  # on the Release run's COMPLETION, whose provenance is the human tag push — the documented escape
  # hatch. `workflows:` must match release.yml's `name:` exactly; the deploy job guards on success.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A workflow_run fires on ANY Release completion; only redeploy when the release actually
    # succeeded. push and workflow_dispatch always deploy.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # The real release version, injected so the landing's badge and the JSON-LD
      # softwareVersion cite the shipped binary — not surface.json's build-time "dev". Written
      # to .env because Vite reads PUBLIC_* from .env files deterministically.
      - name: resolve release version
        run: |
          V=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName | sed 's/^v//')
          echo "PUBLIC_SPORO_VERSION=$V" > web/.env
          echo "resolved release version: $V"
        env:
          GH_TOKEN: ${{ github.token }}

      # install.sh's source of truth is scripts/ (the release tooling owns it); the site serves
      # a copy composed at build time from public/, so the two can never drift.
      - run: cp scripts/install.sh web/public/install.sh

      - run: npm ci
        working-directory: web

      # GITHUB_TOKEN authenticates the changelog's build-time Releases fetch (raises the rate
      # limit; the fetch degrades to an empty state if it fails, so this never breaks the build).
      - run: npm run build
        working-directory: web
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

      - id: deployment
        uses: actions/deploy-pages@v5
