# Deploys web/site (static, no build step — that is the point of it) to GitHub Pages.
# The site is the landing for sporo.dev; the custom domain is attached in the repo's Pages
# settings once DNS points here. Action versions verified against their releases, 2026-07-16.
name: Pages

on:
  push:
    branches: [main]
    paths: ["web/site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/site
      - id: deployment
        uses: actions/deploy-pages@v5
