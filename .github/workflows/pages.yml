# Builds the Astro site (web/) and deploys it to GitHub Pages. Unlike the pre-Astro version,
# this runs a Node build step — that is the price of the docs page being generated from the
# committed command surface instead of hand-written. Action versions verified against their
# releases, 2026-07-16.
name: Pages

on:
  push:
    branches: [main]
    paths: ["web/**", "recipes/**", ".sporo/**", "scripts/install.sh", ".github/workflows/pages.yml"]
  # A published release must redeploy the site: the version badge and the changelog are resolved at
  # BUILD time (`gh release view` / the Releases API), and the tag-triggered Release workflow creates
  # the release AFTER the main push that already deployed the site — so without this the site sits
  # one release behind forever (this latent bug shipped v0.5–v0.9 each a version behind).
  #
  # NOT `on: release`: goreleaser publishes the release with GITHUB_TOKEN, and GitHub does not create
  # workflow runs from GITHUB_TOKEN-triggered events ("other GITHUB_TOKEN-triggered events do not
  # create workflow runs at all", except workflow_dispatch/repository_dispatch). `workflow_run` fires
  # on the Release run's COMPLETION, whose provenance is the human tag push — the documented escape
  # hatch. `workflows:` must match release.yml's `name:` exactly; the deploy job guards on success.
  # The download tally and changelog are resolved at BUILD time, so between pushes and releases
  # they sit frozen. A daily rebuild refreshes them without a push and without any runtime network
  # request (the non-negotiable): the count just re-fetches on the next scheduled build.
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  # Two workflows must redeploy the site on completion, both for the same reason — the site resolves
  # a build-time fact from GitHub that their run produces, and the tag/main push that triggered them
  # already deployed the site once, too early:
  #   - "Release": the version badge + changelog (resolved via `gh release view` / the Releases API).
  #   - "Attest corpus": the per-recipe `attested` mark (lib/attest.ts queries the attestations API for
  #     each export's digest — false until that run signs the bytes, so the mark self-heals here).
  # Both are push-triggered (human tag / human main push), so their completion legitimately creates a
  # workflow_run — unlike a GITHUB_TOKEN-triggered event, which GitHub refuses to chain. The deploy
  # job guards on conclusion == success below.
  workflow_run:
    workflows: ["Release", "Attest corpus"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: read # the build queries the attestations API to earn the per-recipe `attested` mark

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A workflow_run fires on ANY watched-workflow completion (Release or Attest corpus); only
    # redeploy when it actually succeeded. push and workflow_dispatch always deploy.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # The real release version, injected so the landing's badge and the JSON-LD
      # softwareVersion cite the shipped binary — not surface.json's build-time "dev". Written
      # to .env because Vite reads PUBLIC_* from .env files deterministically.
      - name: resolve release version
        run: |
          V=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName | sed 's/^v//')
          echo "PUBLIC_SPORO_VERSION=$V" > web/.env
          # The site-wide lastmod / datePublished date, injected as the deploy date so it tracks the
          # last publish instead of a hand-typed constant (SITE_DATE) that silently goes stale.
          echo "PUBLIC_SITE_DATE=$(date -u +%F)" >> web/.env
          echo "resolved release version: $V (site date $(date -u +%F))"
        env:
          GH_TOKEN: ${{ github.token }}

      # install.sh's source of truth is scripts/ (the release tooling owns it); the site serves
      # a copy composed at build time from public/, so the two can never drift.
      - run: cp scripts/install.sh web/public/install.sh

      - run: npm ci
        working-directory: web

      # GITHUB_TOKEN authenticates the changelog's build-time Releases fetch (raises the rate
      # limit; the fetch degrades to an empty state if it fails, so this never breaks the build).
      - run: npm run build
        working-directory: web
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
