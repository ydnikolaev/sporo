# Official Go vulnerability scanner. Runs daily (vulns are disclosed over time, not per
# commit), on PRs that touch Go/deps, and on demand. Gated by .govulncheck-allow.txt via
# `make vulncheck`, so it's green on accepted findings and loud on new ones.
name: govulncheck

on:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".govulncheck-allow.txt"
      - ".github/workflows/govulncheck.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make vulncheck
