# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
#
# Cross-compiles the `sporo` CLI and cuts a GitHub release. Verified against the
# current goreleaser docs (goreleaser.com, v2.17.0) — see docs/distribution.md
# for what was checked and why the config differs from the naive read of it.
version: 2

project_name: sporo

# No `monorepo:` block on purpose. `monorepo.tag_prefix` — the thing that would let
# a CLI-only tag like `cli/v1.2.3` coexist with a future web release tag in this
# same repo — is GoReleaser Pro-only (confirmed: goreleaser.com/resources/limitations/semver
# says monorepo tag support "is exclusively available in GoReleaser Pro"). We're on
# OSS, so this release is driven by plain `v*` tags instead (see release.yml's tag
# filter). web/ deploys on push to `main`, not by tag, so there's no real collision —
# only a theoretical one if web ever needs its own tagged releases. Revisit then.

before:
  hooks:
    - go mod tidy

builds:
  - id: sporo
    main: ./cmd/sporo
    binary: sporo
    env:
      # Static binary, no cgo toolchain needed on any of the cross-compile targets.
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      # main.version doesn't exist in cmd/sporo yet — a `var version = "dev"` needs
      # to land there (goreleaser's own convention: goreleaser.com/resources/cookbooks/using-main.version)
      # before this actually stamps anything. Until then it's a silent no-op: `go build`
      # ignores -X for an unknown symbol rather than failing.
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    ids: [sporo]
    # Plural `formats:` — the singular `format:` key is deprecated as of the current
    # schema (goreleaser.com/deprecations). tar.gz everywhere, zip only on Windows,
    # because that's the archive format the tools already on each OS expect.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  # Stable-named on purpose: `sporo upgrade` validates the downloaded asset against this
  # file, and its validator addresses it by ONE fixed name across releases. A versioned
  # name here would silently disable checksum validation for every future self-update.
  name_template: "checksums.txt"

changelog:
  # `use: git` (the default) — not `use: github` — so this doesn't need GitHub API
  # reachability to build release notes, which matters while the repo is private
  # and CI has nothing but the default GITHUB_TOKEN.
  sort: asc
  # Shorten the commit SHA in each line (the default is the full 40 chars, which reads as
  # noise jammed against the message). The site further wraps it in a monospace chip.
  abbrev: 7
  # No `filters.exclude`: the earlier bare `^docs:`/`^chore:` never matched the SCOPED commits
  # this repo writes (`docs(rules):`, `chore(mate):`), so they leaked into Other anyway — and
  # the intent is to SHOW the small stuff under "Other changes", not to hide it.
  groups:
    # GoReleaser matches these against the commit subject (`feat(cli): …`), which has no SHA
    # prefix — the old `^[a-f0-9]+` anchor consumed the leading "fea"/"fi" and never matched,
    # dumping every feat/fix into Other and leaving Features/Fixes empty. The optional
    # `[0-9a-f]{7,40}` prefix now tolerates either form (hash-prefixed or bare subject).
    - title: Features
      regexp: '(?i)^([0-9a-f]{7,40}\s+)?feat(\([^)]+\))?!?:'
      order: 0
    - title: Fixes
      regexp: '(?i)^([0-9a-f]{7,40}\s+)?fix(\([^)]+\))?!?:'
      order: 1
    - title: Other changes
      order: 999

release:
  github:
    owner: ydnikolaev
    name: sporo
  # The repo is private for now: this still works because GITHUB_TOKEN in the
  # release workflow has repo-scoped write access regardless of visibility.
  #
  # The header exists because an asset list alone is a quiz ("darwin? arm64?").
  # Answer the reader's actual question — "which file is mine?" — before the list.
  header: |
    ### Which file do I download?

    | your machine | file |
    |---|---|
    | **macOS on Apple Silicon** (M1/M2/M3/M4) | `sporo_{{ .Version }}_darwin_arm64.tar.gz` |
    | **macOS on Intel** | `sporo_{{ .Version }}_darwin_amd64.tar.gz` |
    | Linux x86-64 | `sporo_{{ .Version }}_linux_amd64.tar.gz` |
    | Linux ARM64 | `sporo_{{ .Version }}_linux_arm64.tar.gz` |
    | Windows x86-64 | `sporo_{{ .Version }}_windows_amd64.zip` |
    | Windows ARM64 | `sporo_{{ .Version }}_windows_arm64.zip` |

    Not sure which Mac you have?  → Apple menu → "About This Mac": a chip that says
    "Apple M…" means `arm64`; "Intel" means `amd64`.

    **macOS, one-time:** the pre-release binary is unsigned, so after unpacking run
    `xattr -d com.apple.quarantine ./sporo`, then move it onto your PATH
    (e.g. `mv sporo /usr/local/bin/`). Verify with `sporo --version`.

# `homebrew_casks`, not `brews` — confirmed against goreleaser.com/deprecations:
# `brews` (Homebrew Formula) is marked deprecated in favor of `homebrew_casks`.
# This is a case-in-point difference from the original ask, which named `brews`.
# The cask block also gives us the post-install quarantine-removal hook for free,
# which we'd otherwise have to tell every user to run by hand (see scripts/install.sh).
#
# No `license:` field here — confirmed against goreleaser.com/customization/homebrew:
# `homebrew_casks` has no `license` key (unlike the deprecated `brews`/`scoops`, which
# do). Homebrew's own Cask DSL has no license stanza either, so there's nothing to set
# it to; a LICENSE file at the repo root is the only place Apache-2.0 lives.
#
# `skip_upload: auto` — confirmed against goreleaser.com/customization/publish/homebrew_casks:
# it skips the tap push when the tag looks like a prerelease (e.g. v1.0.0-rc1), not
# specifically for `--snapshot` runs. `--snapshot` already skips every publisher
# unconditionally (goreleaser.com/customization/publish/snapshots), so this is a
# real but separate safety net: it covers a real `v*-rc1`-style tag release too.
# DISABLED until HOMEBREW_TAP_TOKEN exists as a repo secret. The block below is correct and
# ready; it is commented out ONLY so a real `v*` tag can release the CLI (install.sh channel)
# without the token. goreleaser templates `{{ .Env.HOMEBREW_TAP_TOKEN }}` at release time and
# errors on a missing key — `skip_upload: auto` skips the tap PUSH for prereleases but does
# NOT skip that template evaluation, so an un-set token would still red the whole release.
# To re-enable: `gh secret set HOMEBREW_TAP_TOKEN -R ydnikolaev/sporo` (fine-grained PAT,
# contents:write on homebrew-tap only), then uncomment. Nothing else changes.
#
# homebrew_casks:
#   - name: sporo
#     repository:
#       owner: ydnikolaev
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
#     directory: Casks
#     homepage: "https://sporo.dev"
#     description: "Author, check, and export transferable build recipes"
#     skip_upload: auto
#     hooks:
#       post:
#         install: |
#           if OS.mac?
#             system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/sporo"]
#           end
