<!DOCTYPE html>
<!--
  OG card generator — the source of the public/og-*.png social cards. It is the 1b design
  variant (light · product) from the Claude Design OG project, self-hosted fonts, one file
  that renders every page's card off a ?p=<page> query string.

  Regenerate (no build dependency — a one-off headless-Chrome capture, then commit the PNGs):
    1. Open this file in Chrome at a 1200×630 viewport, e.g.
       file://…/web/scripts/og-template.html?p=docs
    2. await document.fonts.ready, then capture the viewport (DPR 2 → 2400×1260 PNG).
    3. Downscale to 1200×630 (sips -z 630 1200 in.png --out ../public/og-<page>.png) — the
       2× capture supersamples, so the 1× card stays crisp.
  Pages: home→og.png, docs→og-docs.png, example→og-example.png, genre→og-genre.png,
  manifesto→og-manifesto.png. og:image:width/height in BaseHead is 1200/630 to match.
-->
<html>
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Archivo';font-style:normal;font-weight:400 800;src:url(../public/fonts/archivo-var.woff2) format('woff2')}
@font-face{font-family:'Archivo';font-style:italic;font-weight:400 800;src:url(../public/fonts/archivo-var-italic.woff2) format('woff2')}
@font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;src:url(../public/fonts/plexmono-400.woff2) format('woff2')}
@font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;src:url(../public/fonts/plexmono-600.woff2) format('woff2')}
*{box-sizing:border-box;margin:0}
html,body{margin:0;padding:0;background:#f7f6f2}
</style>
</head>
<body>
<div id="card" style="width:1200px;height:630px;position:relative;overflow:hidden;background:#f7f6f2;color:#151815;font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased">
  <div style="position:absolute;left:64px;right:64px;top:0;bottom:0;border-left:1px solid #15181522;border-right:1px solid #15181522"></div>
  <div id="numeral" aria-hidden="true" style="position:absolute;bottom:-60px;right:30px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:290px;line-height:1;color:#15181508;user-select:none"></div>
  <div style="position:absolute;inset:0;padding:56px 110px;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;gap:14px;font-weight:700;font-size:30px;letter-spacing:-.02em">
      <svg width="34" height="34" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="4.2" fill="#25714a"></circle><circle cx="11" cy="2.6" r="1.5" fill="#25714a" opacity=".75"></circle><circle cx="18.6" cy="7.4" r="1.5" fill="#25714a" opacity=".55"></circle><circle cx="16.9" cy="16.9" r="1.5" fill="#25714a" opacity=".75"></circle><circle cx="5.1" cy="16.9" r="1.5" fill="#25714a" opacity=".55"></circle><circle cx="3.4" cy="7.4" r="1.5" fill="#25714a" opacity=".75"></circle></svg>
      sporo
    </div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:34px">
      <div id="heading" style="font-size:74px;line-height:1.02;letter-spacing:-.045em;font-weight:760;max-width:18ch"></div>
      <div id="subtitle" style="font-size:29px;line-height:1.4;color:#5d655d;max-width:44ch;text-wrap:pretty"></div>
    </div>
    <div style="display:inline-flex;align-self:flex-start;align-items:center;background:#101410;border-radius:16px;padding:22px 30px;font-family:'IBM Plex Mono',monospace;font-size:23px;color:#d9e4da"><span style="color:#8fd1a4;margin-right:14px">$</span>curl -fsSL sporo.dev/install.sh | sh</div>
  </div>
</div>
<script>
const PAGES = {
  home:     { n: '01', h: 'Transferable build recipes for AI agents.', s: 'One self-contained file that teaches any agent to rebuild your capability — on its own stack, scars included.' },
  docs:     { n: '02', h: 'Every verb the binary carries.', s: 'The command reference, generated from the CLI itself — grouped, flagged, and never drifting from the binary.' },
  example:  { n: '03', h: 'A real recipe, rendered.', s: 'The daily-progress-report recipe in full — the eleven gated sections, the scars, the shape a reader adopts.' },
  genre:    { n: '04', h: 'The recipe genre.', s: 'Eleven gated sections, a neutrality rule, and scars recorded as symptom → root cause → fix.' },
  manifesto:{ n: '05', h: 'Capability moves by teaching.', s: 'Why transferable intent is a third primitive — not a prompt, not a skill package.' },
};
const key = new URLSearchParams(location.search).get('p') || 'home';
const p = PAGES[key];
document.getElementById('numeral').textContent = p.n;
document.getElementById('heading').textContent = p.h;
document.getElementById('subtitle').textContent = p.s;
document.title = 'og-' + key;
</script>
</body>
</html>
